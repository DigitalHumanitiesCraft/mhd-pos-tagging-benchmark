# HiTS → MHDBDB Tagset Mapping
#
# Maps 73 HiTS POS tags (as used in ReM v2.1) to 16 evaluable MHDBDB POS tags.
# (3 MHDBDB tags — CNJ, IPA, DIG — have no HiTS source and are excluded.)
# This is the single source of truth for tagset conversion in the benchmark.
#
# Convention:
#   null  = unmappable (token excluded from evaluation)
#   tag   = direct mapping to MHDBDB tag
#
# Sources:
#   HiTS: Dipper et al. 2013, JLCL 28(1), S. 85–137
#   MHDBDB: mhdbdb-tei-only/.gemini/skills/pos-disambiguator/SKILL.md
#   Suffix system confirmed by Katharina (2026-03-16)
#
# Suffix system: A=attributiv, S=substituierend, D=adverbial, N=nominalisiert
#
# Last updated: 2026-03-16
# Validated against: ReM v2.1 (406 docs, 2,579,276 tokens, 73 unique tags)

version: "0.2.0"
source_tagset: "HiTS"
target_tagset: "MHDBDB"

mappings:
  # ── Nouns ──────────────────────────────────────────
  NA:      NOM    # common noun (387,767)
  NE:      NAM    # proper noun (52,593)

  # ── Adjectives ─────────────────────────────────────
  ADJA:    ADJ    # attributive adjective (61,846)
  ADJD:    ADJ    # predicative/adverbial adjective (29,626)
  ADJS:    ADJ    # other adjective (14,989)
  ADJN:    ADJ    # nominalized adjective (5,392) — could be NOM, default ADJ
  ADJ:     ADJ    # bare base tag (2) — annotation artifact

  # ── Adverbs ────────────────────────────────────────
  AVD:     ADV    # demonstrative adverb: dâ, hie, sô (159,727)
  AVW:     ADV    # interrogative adverb: wâ, wie (5,211) — could be IPA, default ADV
  AVG:     ADV    # general adverb (2,811)

  # ── Determiners: Demonstrative (DD) ────────────────
  DDART:   DET    # article use: der, diu, daz (149,086)
  DDA:     DET    # attributiv: diser, selbe (13,383)
  DDS:     PRO    # substituierend: des, daz standalone (46,155)
  DDD:     ADV    # adverbial: selbe (1,036)
  DDN:     PRO    # nominalisiert: selbe as noun (287)

  # ── Determiners: Indefinite (DI) ───────────────────
  DIA:     DET    # attributiv: ein, manig, iegelich (29,766)
  DIART:   DET    # article use: ein (20,382)
  DIS:     PRO    # substituierend: al, manic, beide (7,181)
  DID:     ADV    # adverbial: alle besunder (2,034)
  DIN:     PRO    # nominalisiert: alle, ander (1,299)

  # ── Determiners: Possessive (DPOS) ─────────────────
  DPOSA:   POS    # attributiv: mîn, dîn, unser (60,599)
  DPOSN:   POS    # nominalisiert (6,156)
  DPOSS:   POS    # substituierend (705)
  DPOSD:   POS    # adverbial: du bist min (60) — stays POS per Katharina

  # ── Determiners: Relative (DREL) ───────────────────
  DRELS:   PRO    # substituierend: der/daz as relative pronoun (26,784)

  # ── Determiners: Interrogative (DW) ────────────────
  DWA:     DET    # attributiv: welch- (481)
  DWS:     PRO    # substituierend (151)
  DWD:     ADV    # adverbial (20)

  # ── Determiners: Generalized (DG = swelch-) ────────
  DGA:     DET    # attributiv: swelch- before noun (507) — confirmed by Katharina
  DGS:     PRO    # substituierend: swelch- standalone (173) — confirmed by Katharina

  # ── Pronouns ───────────────────────────────────────
  PPER:    PRO    # personal pronoun: ich, du, er (211,312)
  PRF:     PRO    # reflexive pronoun: sich (10,892)
  PI:      PRO    # indefinite pronoun (7,366)
  PW:      PRO    # interrogative/relative pronoun: wer, waz (3,997) — could be IPA
  PG:      PRO    # possessive pronoun standalone (3,979)

  # ── Prepositions ───────────────────────────────────
  APPR:    PRP    # preposition (163,421)

  # ── Pronominal Adverbs (PAV) ───────────────────────
  PAVAP:   ADV    # prepositional: dâvon, dâmite (16,809)
  PAVD:    ADV    # demonstrative: dâr+Präp (16,262)
  PAVW:    ADV    # interrogative: wâr+Präp (472) — ADV not IPA, lexical adverbs
  PAVG:    ADV    # generalized: swâr+Präp (23)

  # ── Particles ──────────────────────────────────────
  PTKNEG:  NEG    # negation particle: niht, ne, en (25,111)
  PTKVZ:   ADV    # separated verbal particle (13,992)
  PTKA:    ADV    # adverbial particle (989)
  PTKANT:  INJ    # answer particle: jâ, nein (349) — confirmed by Katharina

  # ── Verbs: Full (VV) ──────────────────────────────
  VVFIN:   VRB    # finite (159,470)
  VVINF:   VRB    # infinitive (47,228)
  VVPP:    VRB    # past participle (43,503)
  VVIMP:   VRB    # imperative (12,602)
  VVPS:    VRB    # present participle (1,687)
  VV:      VRB    # bare base tag (2) — annotation artifact

  # ── Verbs: Auxiliary (VA) ──────────────────────────
  # NOTE: VA* → VEX overcounts. HiTS doesn't distinguish copula (VRB)
  # from auxiliary (VEX). Documented limitation.
  VAFIN:   VEX    # finite (87,282)
  VAINF:   VEX    # infinitive (7,283)
  VAPP:    VEX    # past participle (1,019)
  VAIMP:   VEX    # imperative (536)
  VAPS:    VEX    # present participle (35)

  # ── Verbs: Modal (VM) ─────────────────────────────
  VMFIN:   VEM    # finite (43,359)
  VMINF:   VEM    # infinitive (73)
  VMIMP:   VEM    # imperative (52)
  VMPP:    VEM    # past participle (3)
  VMPS:    VEM    # present participle (2)

  # ── Conjunctions ───────────────────────────────────
  KON:     CCNJ   # coordinating: und, oder, aber (93,916)
  KOUS:    SCNJ   # subordinating: daz, ob (43,728)
  KOKOM:   ADV    # comparative particle: als, wie (2,027)
  "KO*":   null   # ambiguous conjunction (22,473) — context-dependent, excluded Phase 1

  # ── Cardinals ──────────────────────────────────────
  CARDA:   NUM    # attributiv (11,401)
  CARDS:   NUM    # substituierend (3,062)
  CARDN:   NUM    # nominalisiert (151)
  CARDD:   NUM    # adverbial (114)

  # ── Interjections ──────────────────────────────────
  ITJ:     INJ    # interjection (2,409)

  # ── Foreign Material ───────────────────────────────
  FM:      null   # foreign material (26,163)

  # ── Punctuation ────────────────────────────────────
  "$_":    null   # punctuation (286,202)

  # ── Comparative Adverb (ambiguous) ─────────────────
  "AVD-KO*": ADV  # comparative demonstrative adverb (503)

  # ── Untagged ───────────────────────────────────────
  "--":    null   # untagged / missing annotation (121,808)

# Tags requiring context-dependent mapping.
# Phase 1 uses the default. Future phases may add context-sensitive resolution.
ambiguous_mappings:
  AVW:
    note: "wie/wâ as interrogative → IPA, as general adverb → ADV"
    default: ADV
    alternatives: [IPA]

  PW:
    note: "Interrogative pronoun → could be IPA (direct question) or PRO (relative/indefinite)"
    default: PRO
    alternatives: [IPA]

  ADJN:
    note: "Nominalized adjective. MHDBDB tags as NOM if fully substantivized, ADJ otherwise"
    default: ADJ
    alternatives: [NOM]

  "KO*":
    note: "Ambiguous conjunction — could be SCNJ, CCNJ, or ADV. Excluded in Phase 1, context-sensitive in Phase 2"
    default: null
    alternatives: [SCNJ, CCNJ, ADV]
